apiVersion: v1
kind: Service
metadata:
  name: {{ include "nats.fullname" . }}
  labels:
    {{- include "nats.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: "{{ include "nats.name" . }}"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  ports:
    - name: client
      port: {{ .Values.service.port }}
      targetPort: 4222
      protocol: TCP
